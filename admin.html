<!DOCTYPE html>
<html lang="lo">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HR Management System</title>

    <!-- CSS Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap');

        * {
            font-family: 'Noto Sans Lao', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.7);
        }

        /* Loading Spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            border: 4px solid rgba(139, 92, 246, 0.3);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        /* Pulse Animation */
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        .notification.show {
            display: flex;
        }

        .notification.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .notification.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        /* Select Dropdown Styling */
        select option {
            background-color: #1a1a2e;
            color: white;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <!-- Main Container -->
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div class="w-64 bg-[#1a1a2e] border-r border-white/10 flex flex-col">
            <!-- Logo -->
            <div class="p-5 border-b border-white/10">
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-violet-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i data-lucide="building-2" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-white font-bold">HR Admin</h1>
                        <p class="text-white/50 text-xs">Management System</p>
                    </div>
                </div>
            </div>

            <!-- Menu -->
            <div class="flex-1 p-3 space-y-1 overflow-y-auto" id="menuContainer"></div>

            <!-- Export Button -->
            <div class="p-3 border-t border-white/10">
                <button onclick="openExportModal()"
                    class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl hover:shadow-lg hover:shadow-green-500/30 transition-all">
                    <i data-lucide="file-spreadsheet" class="w-5 h-5"></i>
                    <span class="font-medium">Export Excel</span>
                </button>
            </div>

            <!-- Admin Info -->
            <div class="p-4 border-t border-white/10">
                <div class="flex items-center gap-3">
                    <div id="adminAvatar"
                        class="w-10 h-10 bg-gradient-to-br from-pink-500 to-rose-600 rounded-full flex items-center justify-center text-white font-bold">
                        A
                    </div>
                    <div class="flex-1">
                        <p class="text-white text-sm font-medium" id="adminName">Admin</p>
                        <p class="text-white/50 text-xs">ຜູ້ດູແລລະບົບ</p>
                    </div>
                    <button onclick="logout()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5 text-white/50"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <div class="bg-[#1a1a2e] border-b border-white/10 px-6 py-4">
                <div class="flex items-center justify-between">
                    <div>
                        <h2 class="text-white text-xl font-bold" id="pageTitle">Dashboard</h2>
                        <p class="text-white/50 text-sm" id="currentDate"></p>
                    </div>
                    <div class="flex items-center gap-3">
                        <!-- Period Filter -->
                        <div class="flex bg-white/5 rounded-xl p-1">
                            <button onclick="setPeriod('today')"
                                class="period-btn px-4 py-2 rounded-lg text-sm transition-all bg-violet-600 text-white"
                                data-period="today">
                                ມື້ນີ້
                            </button>
                            <button onclick="setPeriod('week')"
                                class="period-btn px-4 py-2 rounded-lg text-sm transition-all text-white/60 hover:text-white"
                                data-period="week">
                                ອາທິດ
                            </button>
                            <button onclick="setPeriod('month')"
                                class="period-btn px-4 py-2 rounded-lg text-sm transition-all text-white/60  hover:text-white"
                                data-period="month">
                                ເດືອນ
                            </button>
                        </div>

                        <button onclick="refreshData()"
                            class="p-2 bg-white/5 rounded-xl text-white/60 hover:text-white transition-colors">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                        </button>

                        <button
                            class="relative p-2 bg-white/5 rounded-xl text-white/60 hover:text-white transition-colors">
                            <i data-lucide="bell" class="w-5 h-5"></i>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"
                                id="notificationDot"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="flex-1 overflow-auto p-6" id="contentArea">
                <!-- Dynamic content will be rendered here -->
            </div>
        </div>
    </div>

    <!-- Employee Modals -->
    <div id="registerModal" class="modal"></div>
    <div id="editModal" class="modal"></div>
    <div id="resetPINModal" class="modal"></div>
    <div id="editAttendanceModal" class="modal"></div>

    <!-- Export Modal -->
    <div id="exportModal" class="modal">
        <div class="bg-[#1a1a2e] rounded-3xl p-6 w-full max-w-md border border-white/10 shadow-2xl">
            <div id="exportSelection">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-white text-xl font-bold flex items-center gap-2">
                        <i data-lucide="file-spreadsheet" class="w-6 h-6 text-green-400"></i>
                        Export to Excel
                    </h3>
                    <button onclick="closeExportModal()" class="text-white/50 hover:text-white transition-colors">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>

                <div class="space-y-3 mb-6" id="exportOptions"></div>

                <div class="space-y-3 mb-6">
                    <p class="text-white/60 text-sm">ເລືອກຊ່ວງເວລາ:</p>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setExportPeriod('today')"
                            class="export-period-btn py-2 px-3 rounded-lg text-sm bg-white/10 text-white/70 hover:bg-white/20"
                            data-period="today">
                            ມື້ນີ້
                        </button>
                        <button onclick="setExportPeriod('week')"
                            class="export-period-btn py-2 px-3 rounded-lg text-sm bg-white/10 text-white/70 hover:bg-white/20"
                            data-period="week">
                            ອາທິດນີ້
                        </button>
                        <button onclick="setExportPeriod('month')"
                            class="export-period-btn py-2 px-3 rounded-lg text-sm bg-violet-500 text-white"
                            data-period="month">
                            ເດືອນນີ້
                        </button>
                    </div>
                </div>

                <button onclick="startExport()"
                    class="w-full py-4 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-green-500/30 transition-all">
                    <i data-lucide="download" class="w-5 h-5"></i>
                    ດາວໂຫຼດ Excel File
                </button>
            </div>

            <div id="exportLoading" class="text-center py-8" style="display:none;">
                <div class="spinner mx-auto mb-4"></div>
                <p class="text-white font-medium">ກຳລັງສ້າງໄຟລ໌ Excel...</p>
                <p class="text-white/50 text-sm mt-1">ກະລຸນາລໍຖ້າ</p>
            </div>

            <div id="exportSuccess" class="text-center py-8" style="display:none;">
                <div class="w-16 h-1 6 mx-auto mb-4 bg-green-500 rounded-full flex items-center justify-center">
                    <i data-lucide="check" class="w-8 h-8 text-white"></i>
                </div>
                <p class="text-white font-medium">ສ້າງໄຟລ໌ສຳເລັດ!</p>
                <p class="text-green-400 text-sm mt-1" id="exportFilename"></p>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="notificationText"></span>
    </div>

    <!-- Import JavaScript Modules -->
    <script src="js/admin/core.js?v=2"></script>
    <script src="js/admin/dashboard.js?v=2"></script>
    <script src="js/admin/employees.js?v=2"></script>
    <script src="js/admin/export.js?v=2"></script>
    <script src="js/admin/leave.js?v=2"></script>

</body>

</html>
