<!DOCTYPE html>
<html lang="lo">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e1b4b">
  <meta name="description" content="ລະບົບກົດເຂົ້າ-ອອກວຽກ">
  <link rel="manifest" href="manifest.json">
  <title>HR Attendance</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&display=swap');

    * {
      font-family: 'Noto Sans Lao', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a 0%, #581c87 50%, #0f172a 100%);
      min-height: 100vh;
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    // ====== CONFIG - ປ່ຽນຕາມຫ້ອງການຂອງທ່ານ ======
    const CONFIG = {
      // ✅ Apps Script API URL (v3 - Production Ready)
      API_URL: 'https://script.google.com/macros/s/AKfycbycOiN5w_UWkqVCaGen6vkxhZKyNczs1BpiN_BIzhScd9Eq1AkEzPh5Ic8AQbBRMiqk/exec',

      OFFICE_LAT: 17.962501366620828,    // Latitude ຫ້ອງການ (ອັບເດດແລ້ວ)
      OFFICE_LNG: 102.64169714794403,   // Longitude ຫ້ອງການ (ອັບເດດແລ້ວ)
      RADIUS: 100             // ລັດສະໝີ (ແມັດ)
    };

    // ====== API CLIENT ======
    async function callAPI(action, data = {}) {
      try {
        const response = await fetch(CONFIG.API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, ...data })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        return await response.json();
      } catch (error) {
        console.error('API Error:', error);
        return { success: false, error: error.message };
      }
    }

    // ====== STATE ======
    let state = {
      screen: 'login',
      tab: 'home',
      user: null,
      loading: false,
      error: '',
      successMessage: '',
      location: null,
      distance: null,
      locationStatus: 'idle',
      todayAttendance: { checkIn: null, checkOut: null },
      history: []
    };

    // ====== UTILITIES ======
    const getDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371e3;
      const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
      const Δφ = (lat2 - lat1) * Math.PI / 180, Δλ = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(Δφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    };

    const formatTime = (date) => date.toLocaleTimeString('lo-LA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const formatDate = (date) => date.toLocaleDateString('lo-LA', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    // ====== RENDER FUNCTIONS ======
    function render() {
      const app = document.getElementById('app');
      if (state.screen === 'login') {
        app.innerHTML = renderLogin();
      } else {
        app.innerHTML = renderMain();
      }
      lucide.createIcons();
      attachEvents();
    }

    function renderLogin() {
      return `
        <div class="min-h-screen flex items-center justify-center p-4">
          <div class="w-full max-w-sm">
            <div class="text-center mb-8">
              <div class="w-20 h-20 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4">
                <i data-lucide="building-2" class="w-10 h-10 text-white"></i>
              </div>
              <h1 class="text-2xl font-bold text-white">HR Attendance</h1>
              <p class="text-purple-300 text-sm">ລະບົບກົດເຂົ້າ-ອອກວຽກ</p>
            </div>
            
            <div class="glass rounded-2xl p-6 border border-white/20">
              <div class="space-y-4">
                <div>
                  <label class="text-purple-200 text-sm mb-1 block">ລະຫັດພະນັກງານ</label>
                  <input type="text" id="empId" value="EMP001" 
                    class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                  <label class="text-purple-200 text-sm mb-1 block">PIN</label>
                  <input type="password" id="pin" value="1234" maxlength="4"
                    class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                
                ${state.error ? `<p class="text-red-400 text-sm text-center">${state.error}</p>` : ''}
                
                <button id="loginBtn" class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl font-medium flex items-center justify-center gap-2 hover:opacity-90 transition">
                  <i data-lucide="log-in" class="w-5 h-5"></i>
                  ${state.loading ? 'ກຳລັງເຂົ້າສູ່ລະບົບ...' : 'ເຂົ້າສູ່ລະບົບ'}
                </button>
              </div>
              <p class="text-center text-purple-300/60 text-xs mt-4">Demo: PIN = 1234</p>
            </div>
          </div>
        </div>
      `;
    }

    function renderMain() {
      return `
        <!-- Header -->
        <div class="glass border-b border-white/10 px-4 py-4">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-white font-semibold">${state.user?.name || ''}</p>
              <p class="text-purple-300 text-xs">${state.user?.position || ''}</p>
            </div>
            <button class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center">
              <i data-lucide="bell" class="w-5 h-5 text-white"></i>
            </button>
          </div>
        </div>

        <!-- Content -->
        <div class="p-4 pb-24">
          ${state.tab === 'home' ? renderHome() : ''}
          ${state.tab === 'history' ? renderHistory() : ''}
          ${state.tab === 'profile' ? renderProfile() : ''}
        </div>

        <!-- Bottom Nav -->
        <div class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-filter backdrop-blur-lg border-t border-white/10 px-4 py-2">
          <div class="flex justify-around">
            <button data-tab="home" class="tab-btn flex flex-col items-center py-2 px-4 rounded-xl ${state.tab === 'home' ? 'text-purple-400' : 'text-white/50'}">
              <i data-lucide="home" class="w-6 h-6"></i>
              <span class="text-xs mt-1">ໜ້າຫຼັກ</span>
            </button>
            <button data-tab="history" class="tab-btn flex flex-col items-center py-2 px-4 rounded-xl ${state.tab === 'history' ? 'text-purple-400' : 'text-white/50'}">
              <i data-lucide="history" class="w-6 h-6"></i>
              <span class="text-xs mt-1">ປະຫວັດ</span>
            </button>
            <button data-tab="profile" class="tab-btn flex flex-col items-center py-2 px-4 rounded-xl ${state.tab === 'profile' ? 'text-purple-400' : 'text-white/50'}">
              <i data-lucide="user-circle" class="w-6 h-6"></i>
              <span class="text-xs mt-1">ໂປຣໄຟລ໌</span>
            </button>
          </div>
        </div>
        
        ${state.loading ? `
          <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div class="glass p-6 rounded-2xl border border-white/20">
              <div class="flex items-center gap-3">
                <div class="w-6 h-6 border-2 border-purple-400 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-white">ກຳລັງໂຫຼດ...</p>
              </div>
            </div>
          </div>
        ` : ''}
      `;
    }

    function renderHome() {
      const now = new Date();
      const locIcon = state.locationStatus === 'in_range' ? 'text-green-400' : state.locationStatus === 'out_range' ? 'text-red-400' : 'text-purple-300';

      return `
        <div class="space-y-4">
          ${state.successMessage ? `
            <div class="glass rounded-xl p-4 border border-green-400/50 bg-green-500/20 animate-pulse">
              <p class="text-green-300 text-center font-medium">${state.successMessage}</p>
            </div>
          ` : ''}
          
          ${state.error ? `
            <div class="glass rounded-xl p-4 border border-red-400/50 bg-red-500/20">
              <p class="text-red-300 text-center">${state.error}</p>
            </div>
          ` : ''}
          
          <!-- Time Card -->
          <div class="bg-gradient-to-br from-purple-500/30 to-pink-500/30 backdrop-blur rounded-2xl p-6 border border-white/20 text-center">
            <p class="text-purple-200 text-sm">${formatDate(now)}</p>
            <p id="clock" class="text-5xl font-bold text-white my-2 font-mono">${formatTime(now)}</p>
            <div class="flex justify-center gap-6 mt-4">
              <div class="text-center">
                <p class="text-purple-300 text-xs">ເຂົ້າວຽກ</p>
                <p class="text-white font-bold text-lg">${state.todayAttendance.checkIn || '--:--'}</p>
              </div>
              <div class="w-px bg-white/20"></div>
              <div class="text-center">
                <p class="text-purple-300 text-xs">ອອກວຽກ</p>
                <p class="text-white font-bold text-lg">${state.todayAttendance.checkOut || '--:--'}</p>
              </div>
            </div>
          </div>

          <!-- Location -->
          <div class="glass rounded-2xl p-4 border border-white/20">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <i data-lucide="map-pin" class="w-5 h-5 ${locIcon}"></i>
                <span class="text-white font-medium">ຕຳແໜ່ງປັດຈຸບັນ</span>
              </div>
              <button id="checkLocationBtn" class="px-3 py-1 bg-purple-500/30 text-purple-200 rounded-lg text-sm hover:bg-purple-500/50">
                ${state.locationStatus === 'loading' ? 'ກຳລັງກວດ...' : 'ກວດສອບ'}
              </button>
            </div>
            ${state.locationStatus !== 'idle' ? `
              <div class="p-3 rounded-xl ${state.locationStatus === 'in_range' ? 'bg-green-500/20' : state.locationStatus === 'out_range' ? 'bg-red-500/20' : 'bg-yellow-500/20'}">
                ${state.locationStatus === 'loading' ? '<p class="text-yellow-300 text-sm">⏳ ກຳລັງດຶງຕຳແໜ່ງ GPS...</p>' : ''}
                ${state.locationStatus === 'in_range' ? `<p class="text-green-300 text-sm">✅ ຢູ່ໃນຂອບເຂດ (${state.distance}m ຈາກຫ້ອງການ)</p>` : ''}
                ${state.locationStatus === 'out_range' ? `<p class="text-red-300 text-sm">❌ ຢູ່ນອກຂອບເຂດ (${state.distance}m ຈາກຫ້ອງການ)</p>` : ''}
                ${state.locationStatus === 'error' ? `<p class="text-yellow-300 text-sm">⚠️ ${state.error}</p>` : ''}
              </div>
            ` : ''}
          </div>

          <!-- Action Buttons -->
          <div class="grid grid-cols-2 gap-3">
            <button id="checkInBtn" ${state.locationStatus !== 'in_range' || state.todayAttendance.checkIn ? 'disabled' : ''} 
              class="p-4 rounded-2xl flex flex-col items-center gap-2 transition ${state.locationStatus === 'in_range' && !state.todayAttendance.checkIn ? 'bg-gradient-to-br from-green-500 to-emerald-600 text-white shadow-lg' : 'bg-white/10 text-white/50'}">
              <i data-lucide="log-in" class="w-8 h-8"></i>
              <span class="font-medium">ເຂົ້າວຽກ</span>
              ${state.todayAttendance.checkIn ? `<span class="text-xs">✓ ${state.todayAttendance.checkIn}</span>` : ''}
            </button>
            <button id="checkOutBtn" ${state.locationStatus !== 'in_range' || !state.todayAttendance.checkIn || state.todayAttendance.checkOut ? 'disabled' : ''}
              class="p-4 rounded-2xl flex flex-col items-center gap-2 transition ${state.locationStatus === 'in_range' && state.todayAttendance.checkIn && !state.todayAttendance.checkOut ? 'bg-gradient-to-br from-orange-500 to-red-500 text-white shadow-lg' : 'bg-white/10 text-white/50'}">
              <i data-lucide="log-out" class="w-8 h-8"></i>
              <span class="font-medium">ອອກວຽກ</span>
              ${state.todayAttendance.checkOut ? `<span class="text-xs">✓ ${state.todayAttendance.checkOut}</span>` : ''}
            </button>
          </div>

          <!-- Stats -->
          <div class="glass rounded-2xl p-4 border border-white/20">
            <h3 class="text-white font-medium mb-3">ສະຖິຕິເດືອນນີ້</h3>
            <div class="grid grid-cols-3 gap-3">
              <div class="text-center p-3 bg-white/5 rounded-xl">
                <p class="text-2xl font-bold text-green-400">18</p>
                <p class="text-purple-300 text-xs">ມາວຽກ</p>
              </div>
              <div class="text-center p-3 bg-white/5 rounded-xl">
                <p class="text-2xl font-bold text-yellow-400">2</p>
                <p class="text-purple-300 text-xs">ມາສາຍ</p>
              </div>
              <div class="text-center p-3 bg-white/5 rounded-xl">
                <p class="text-2xl font-bold text-red-400">1</p>
                <p class="text-purple-300 text-xs">ຂາດ</p>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderHistory() {
      return `
        <div class="space-y-3">
          <h2 class="text-white font-bold text-lg">ປະຫວັດການເຂົ້າວຽກ</h2>
          
          ${state.history.length === 0 ? `
            <div class="glass rounded-xl p-8 border border-white/20 text-center">
              <i data-lucide="inbox" class="w-12 h-12 text-purple-300 mx-auto mb-3"></i>
              <p class="text-purple-300">ຍັງບໍ່ມີປະຫວັດການເຂົ້າວຽກ</p>
            </div>
          ` : state.history.map(r => `
            <div class="glass rounded-xl p-4 border border-white/20">
              <div class="flex justify-between items-start">
                <div>
                  <p class="text-white font-medium">${r.date}</p>
                  <div class="flex gap-4 mt-1">
                    <span class="text-purple-300 text-sm">ເຂົ້າ: ${r.checkIn}</span>
                    <span class="text-purple-300 text-sm">ອອກ: ${r.checkOut}</span>
                  </div>
                </div>
                <div class="text-right">
                  <span class="text-xs px-2 py-1 rounded-full ${r.status === 'on_time' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}">
                    ${r.status === 'on_time' ? 'ປົກກະຕິ' : 'ສາຍ'}
                  </span>
                  <p class="text-purple-300 text-xs mt-1">${r.hours} ຊມ</p>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderProfile() {
      return `
        <div class="space-y-4">
          <div class="glass rounded-2xl p-6 border border-white/20 text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-purple-500 to-pink-500 rounded-full mx-auto flex items-center justify-center mb-4">
              <i data-lucide="user" class="w-10 h-10 text-white"></i>
            </div>
            <h2 class="text-white font-bold text-lg">${state.user?.name}</h2>
            <p class="text-purple-300">${state.user?.position}</p>
            <p class="text-purple-400 text-sm">${state.user?.dept}</p>
            <p class="text-purple-500 text-xs mt-2">ID: ${state.user?.id}</p>
          </div>
          
          <div class="glass rounded-2xl border border-white/20 overflow-hidden">
            ${state.user?.role === 'admin' ? `
              <button onclick="window.location.href='admin.html'" class="w-full flex items-center justify-between p-4 hover:bg-white/5 border-b border-white/10">
                <div class="flex items-center gap-3">
                  <i data-lucide="shield" class="w-5 h-5 text-purple-400"></i>
                  <span class="text-white">ຈັດການລະບົບ (Admin)</span>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 text-purple-400"></i>
              </button>
            ` : ''}
            <button onclick="openLeaveRequestModal()" class="w-full flex items-center justify-between p-4 hover:bg-white/5 border-b border-white/10">
              <div class="flex items-center gap-3">
                <i data-lucide="calendar" class="w-5 h-5 text-purple-400"></i>
                <span class="text-white">ຂໍລາພັກ</span>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-purple-400"></i>
            </button>
            <button onclick="viewLeaveBalance()" class="w-full flex items-center justify-between p-4 hover:bg-white/5 border-b border-white/10">
              <div class="flex items-center gap-3">
                <i data-lucide="clock" class="w-5 h-5 text-purple-400"></i>
                <span class="text-white">ໂຄຕ້າລາພັກ</span>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-purple-400"></i>
            </button>
            <button onclick="openSalaryModal()" class="w-full flex items-center justify-between p-4 hover:bg-white/5 border-b border-white/10">
              <div class="flex items-center gap-3">
                <i data-lucide="file-text" class="w-5 h-5 text-purple-400"></i>
                <span class="text-white">ໃບຮັບເງິນເດືອນ</span>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-purple-400"></i>
            </button>
            <button class="w-full flex items-center justify-between p-4 hover:bg-white/5">
              <div class="flex items-center gap-3">
                <i data-lucide="settings" class="w-5 h-5 text-purple-400"></i>
                <span class="text-white">ຕັ້ງຄ່າ</span>
              </div>
              <i data-lucide="chevron-right" class="w-5 h-5 text-purple-400"></i>
            </button>
          </div>
          
          <button id="logoutBtn" class="w-full py-3 bg-red-500/20 text-red-400 rounded-xl font-medium">
            ອອກຈາກລະບົບ
          </button>
        </div>
      `;
    }

    // ====== EVENT HANDLERS ======
    function attachEvents() {
      // Login
      document.getElementById('loginBtn')?.addEventListener('click', handleLogin);

      // Tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.tab = btn.dataset.tab;
          render();
        });
      });

      // Location
      document.getElementById('checkLocationBtn')?.addEventListener('click', checkLocation);

      // Check In/Out
      document.getElementById('checkInBtn')?.addEventListener('click', handleCheckIn);
      document.getElementById('checkOutBtn')?.addEventListener('click', handleCheckOut);

      // Logout
      document.getElementById('logoutBtn')?.addEventListener('click', () => {
        state.screen = 'login';
        state.user = null;
        render();
      });
    }

    async function handleLogin() {
      const empId = document.getElementById('empId').value;
      const pin = document.getElementById('pin').value;

      if (!empId || !pin) {
        state.error = 'ກະລຸນາໃສ່ລະຫັດພະນັກງານແລະ PIN';
        render();
        return;
      }

      state.loading = true;
      state.error = '';
      render();

      const result = await callAPI('login', { empId, pin });

      if (result.success) {
        state.user = result.user;
        localStorage.setItem('hrUser', JSON.stringify(result.user));
        state.screen = 'main';
        state.error = '';

        await loadTodayAttendance();
        await loadAttendanceHistory();
      } else {
        state.error = result.error || 'ເຂົ້າສູ່ລະບົບລົ້ມເຫຼວ';
      }

      state.loading = false;
      render();
    }

    async function loadTodayAttendance() {
      if (!state.user) return;

      const result = await callAPI('getTodayAttendance', {
        employeeId: state.user.id
      });

      if (result.success && result.attendance) {
        state.todayAttendance = {
          checkIn: result.attendance.checkIn || null,
          checkOut: result.attendance.checkOut || null,
          status: result.attendance.status || null,
          workHours: result.attendance.workHours || 0
        };
      } else {
        state.todayAttendance = { checkIn: null, checkOut: null };
      }
    }

    async function loadAttendanceHistory() {
      if (!state.user) return;

      const result = await callAPI('getAttendanceHistory', {
        employeeId: state.user.id,
        limit: 30
      });

      if (result.success && result.history) {
        state.history = result.history.map(r => ({
          date: r.date,
          checkIn: r.checkIn,
          checkOut: r.checkOut,
          status: r.status,
          hours: r.workHours
        }));
      } else {
        state.history = [];
      }
    }

    function showSuccess(message) {
      state.successMessage = message;
      render();

      setTimeout(() => {
        state.successMessage = '';
        render();
      }, 5000);
    }

    function checkLocation() {
      state.locationStatus = 'loading';
      render();

      if (!navigator.geolocation) {
        state.locationStatus = 'error';
        state.error = 'Browser ບໍ່ຮອງຮັບ GPS';
        render();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          state.location = { lat: latitude, lng: longitude };
          state.distance = Math.round(getDistance(latitude, longitude, CONFIG.OFFICE_LAT, CONFIG.OFFICE_LNG));
          state.locationStatus = state.distance <= CONFIG.RADIUS ? 'in_range' : 'out_range';
          render();
        },
        (err) => {
          state.locationStatus = 'error';
          state.error = 'ບໍ່ສາມາດດຶງຕຳແໜ່ງໄດ້';
          render();
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    async function handleCheckIn() {
      if (!state.location) {
        state.error = 'ກະລຸນາກວດສອບ GPS ກ່ອນກົດເຂົ້າວຽກ';
        render();
        return;
      }

      if (state.locationStatus !== 'in_range') {
        state.error = 'ທ່ານຢູ່ນອກຂອບເຂດຫ້ອງການ';
        render();
        return;
      }

      state.loading = true;
      render();

      const result = await callAPI('checkIn', {
        employeeId: state.user.id,
        lat: state.location.lat,
        lng: state.location.lng
      });

      if (result.success) {
        state.todayAttendance.checkIn = result.time;
        state.todayAttendance.status = result.status;
        state.error = '';
        showSuccess(`✅ ${result.message} (${result.status === 'on_time' ? 'ປົກກະຕິ' : 'ສາຍ'})`);
        await loadAttendanceHistory();
      } else {
        state.error = '❌ ' + result.error;
      }

      state.loading = false;
      render();
    }

    async function handleCheckOut() {
      if (!state.location) {
        state.error = 'ກະລຸນາກວດສອບ GPS ກ່ອນກົດອອກວຽກ';
        render();
        return;
      }

      if (state.locationStatus !== 'in_range') {
        state.error = 'ທ່ານຢູ່ນອກຂອບເຂດຫ້ອງການ';
        render();
        return;
      }

      state.loading = true;
      render();

      const result = await callAPI('checkOut', {
        employeeId: state.user.id,
        lat: state.location.lat,
        lng: state.location.lng
      });

      if (result.success) {
        state.todayAttendance.checkOut = result.checkOut;
        state.error = '';
        showSuccess(`✅ ${result.message} | ເຮັດວຽກ: ${result.workHours} ຊົ່ວໂມງ`);
        await loadAttendanceHistory();
      } else {
        state.error = '❌ ' + result.error;
      }

      state.loading = false;
      render();
    }

    // ====== CLOCK UPDATE ======
    setInterval(() => {
      const clock = document.getElementById('clock');
      if (clock) clock.textContent = formatTime(new Date());
    }, 1000);

    // ====== INIT ======
    render();
  </script>
</body>

</html>
